name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          # (Required) Comma-separated list of binary names (non-extension portion) to build and upload.
          # Note that glob pattern is not supported yet.
          bin: audiobook-downloader
          target: ${{ matrix.target }}
          tar: unix
          zip: windows
          # (Optional) Comma-separated list of extra files to include in the archive.
          include: README.md, LICENSE
          token: ${{ secrets.GITHUB_TOKEN }}
